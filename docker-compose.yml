services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: decision_engine
      POSTGRES_USER: decision_engine
      POSTGRES_PASSWORD: decision_engine
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  mercure:
    image: dunglas/mercure
    environment:
      SERVER_NAME: ":80"
      MERCURE_PUBLISHER_JWT_KEY: change-me
      MERCURE_SUBSCRIBER_JWT_KEY: change-me
      MERCURE_EXTRA_DIRECTIVES: |
        cors_origins *
    ports:
      - "3001:80"

volumes:
  postgres-data:

